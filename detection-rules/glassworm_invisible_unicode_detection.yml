attack_types:
  - "Malware/Ransomware"
  - "Callback Phishing"

tactics_and_techniques:
  - "Evasion"
  - "Obfuscation"
  - "Attachment: Code"

false_positives:
  - "U+200C (Zero-Width Non-Joiner) appears legitimately in Gmail HTML email
     formatting. Rule requires 5+ consecutive occurrences to eliminate this
     false positive class. Isolated single characters are not flagged."
  - "U+FE00–U+FE0F (Variation Selectors 1-16) appear in emoji rendering
     sequences from major mail providers. Rule requires 3+ consecutive
     occurrences. Single variation selectors accompanying emoji are not flagged."
  - "U+202E (RLO), Tag block (U+E0000–U+E007F), and Variation Selectors
     Supplement (U+E0100–U+E01EF) have zero threshold — no legitimate email
     use case exists for these ranges regardless of sender."
